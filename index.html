<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Happy Birthday!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ffe6ff 0, #ffd1dc 40%, #ff9a9e 100%);
      overflow: hidden;
    }

    .card {
      position: relative;
      text-align: center;
      padding: 40px 30px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15);
      max-width: 450px;
      width: 90%;
      animation: float 3s ease-in-out infinite;
    }

    .title {
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ff4b95, #ffb347, #7f7fff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .name {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: #ff4b5c;
    }

    /* 🔥 IMAGE GALLERY STYLE */
    .gallery {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0 20px 0;
    }

    .gallery img {
      width: 85px;
      height: 85px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }

    .message {
      font-size: 1rem;
      line-height: 1.6;
      color: #444;
      margin-bottom: 24px;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 999px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #ff4b95, #ffb347);
      color: #fff;
      box-shadow: 0 8px 18px rgba(255, 75, 149, 0.4);
      transition: transform 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
    }

    .small-text {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #777;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>

  <div class="card">

    <h1 class="title">Happy Birthday!</h1>
    <h2 class="name">Pratiksha 🎉</h2>

    <!-- 🔥 4 IMAGES ADDED HERE -->
    <div class="gallery">
      <img src="img1.jpg" alt="Memory 1">
      <img src="img2.jpg" alt="Memory 2">
      <img src="img3.jpg" alt="Memory 3">
      <img src="img4.jpg" alt="Memory 4">
    </div>

    <p class="message">
      Happy Birthday Pratiksha ❤️  
      I pray you always stay happy, healthy, and full of dreams. ❤️🎂✨  
      May your smile always stay this bright and your heart always stay this pure.  
      I’m so lucky to have you in my life 💕✨
    </p>

    <button class="btn" onclick="showWish()">
      Click for a special wish
    </button>

    <p class="small-text" id="extraWish"></p>
  </div>

  <script>
    function showWish() {
      const extra = document.getElementById("extraWish");
      extra.innerHTML = `
        Every memory with you is a treasure 💖<br>
        Every moment with you feels like a blessing ✨<br>
        Always stay this magical ❤️🎂
      `;
    }
  </script>

</body>
</html>
